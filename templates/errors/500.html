{% extends "layouts/base.html" %}

{% block title %}
500 - Server Error
{% endblock %}

{% block content %}

<div class="container py-5 text-center">

    <i class="bi bi-exclamation-triangle-fill display-1" style="color: var(--danger);"></i>

    <h1 class="mt-4">

        500

    </h1>

    <h3>

        Something Went Wrong

    </h3>

    <p style="color: var(--text-light);">

        An unexpected error occurred.
        Please try again later.

    </p>

    <a
        href="{{ url_for('main.home') }}"
        class="primary-btn">

        Back to Home

    </a>

</div>

{% endblock %}
