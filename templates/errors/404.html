{% extends "layouts/base.html" %}

{% block title %}
404 - Page Not Found
{% endblock %}

{% block content %}

<div class="container py-5 text-center">

    <i class="bi bi-search display-1 text-primary"></i>

    <h1 class="mt-4">

        404

    </h1>

    <h3>

        Page Not Found

    </h3>

    <p class="text-muted">

        The page you are looking for doesn't exist.

    </p>

    <a
        href="{{ url_for('main.home') }}"
        class="primary-btn">

        Back to Home

    </a>

</div>

{% endblock %}
