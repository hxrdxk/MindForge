{% extends "layouts/base.html" %}

{% block title %}
403 - Access Denied
{% endblock %}

{% block content %}

<div class="container py-5 text-center">

    <i class="bi bi-shield-lock-fill display-1" style="color: var(--warning);"></i>

    <h1 class="mt-4">

        403

    </h1>

    <h3>

        Access Denied

    </h3>

    <p style="color: var(--text-light);">

        You do not have permission to access this page.

    </p>

    <a
        href="{{ url_for('main.home') }}"
        class="primary-btn">

        Go Home

    </a>

</div>

{% endblock %}
