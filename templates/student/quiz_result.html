{% extends "layouts/base.html" %}

{% block content %}

<div class="container py-5">

<h2>

Quiz Result

</h2>

<h1>

{{ attempt.score }}%

</h1>

{% if attempt.passed %}

<div class="alert alert-success">

Passed 🎉

</div>

{% else %}

<div class="alert alert-danger">

Failed

</div>

{% endif %}

<a
href="{{ url_for(
'student.course_curriculum',
course_id=attempt.quiz.module.course.id
) }}"
class="primary-btn">

Back to Course

</a>

</div>

{% endblock %}
