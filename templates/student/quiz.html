{% extends "layouts/student_layout.html" %}

{% block dashboard_content %}

<h2>{{ quiz.title }}</h2>

<form method="POST">

<div class="mb-4">

    <strong>

        {{ quiz.questions|length }}

        Questions

    </strong>

</div>

{% for question in quiz.questions %}

<div class="glass-card mb-4 mt-4">

<div>

<div class="d-flex align-items-center gap-3 mb-4">

    <strong class="mf-badge mf-badge-primary">

        Q{{ loop.index }}.

    </strong>

    <h4 class="mb-0">

        {{ question.question_text }}

    </h4>

</div>

{% for option in question.options %}

<label class="mf-option">

    <input
        type="radio"
        name="question_{{ question.id }}"
        value="{{ option.id }}">

    <span>

        {{ option.option_text }}

    </span>

</label>

{% endfor %}

</div>

</div>

{% endfor %}

<div class="text-center mt-5">

    <button
        type="submit"
        class="primary-btn">

        <i class="bi bi-check-circle text-light"></i>

        Submit Quiz

    </button>

</div>

</form>

{% endblock %}
