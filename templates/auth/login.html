{% extends "auth/auth_base.html" %}

{% block title %}
Login | {{ brand.name }}
{% endblock %}

{% block auth_content %}

<h2>Welcome Back</h2>

<p>

    Sign in to continue your learning journey with MindForge.

</p>

<form
    method="POST"
    action="{{ url_for('auth.login') }}"
    class="auth-form">

    <div>

        <label for="email">

            Email Address

        </label>

        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required>

    </div>

    <div>

        <label for="password">

            Password

        </label>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required>

    </div>

    <button
        type="submit"
        class="primary-btn auth-submit">

        Login

    </button>

</form>

<div class="auth-divider">

    Don't have an account?

</div>

<div class="auth-footer">

    <a href="{{ url_for('auth.register') }}">

        Create Account

    </a>

</div>

{% endblock %}
