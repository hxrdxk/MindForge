{% extends "auth/auth_base.html" %}

{% block title %}
Create Account | {{ brand.name }}
{% endblock %}

{% block auth_content %}

<h2>Create Account</h2>

<p>

    Join MindForge and start your AI-powered learning journey.

</p>

<form
    method="POST"
    action="{{ url_for('auth.register') }}"
    class="auth-form">

    <div>

        <label for="full_name">

            Full Name

        </label>

        <input
            type="text"
            id="full_name"
            name="full_name"
            placeholder="Enter your full name"
            required>

    </div>

    <div>

        <label for="email">

            Email Address

        </label>

        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required>

    </div>

    <div>

        <label for="password">

            Password

        </label>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            required>

    </div>

    <button
        type="submit"
        class="primary-btn auth-submit">

        Create Account

    </button>

</form>

<div class="auth-divider">

    Already have an account?

</div>

<div class="auth-footer">

    <a href="{{ url_for('auth.login') }}">

        Login

    </a>

</div>

{% endblock %}
