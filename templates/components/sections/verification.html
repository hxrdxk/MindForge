<section class="py-5 bg-light">

    <div class="container">

        <div class="text-center mb-4">

            <h2>

                Verify Certificate

            </h2>

            <p style="color: var(--text-light);">

                Enter a certificate ID to verify its authenticity.

            </p>

        </div>

        <div class="row justify-content-center">

            <div class="col-md-6">

                <form id="certificateVerifyForm">

                    <div class="input-group">

                        <input
                            type="text"
                            id="certificateId"
                            class="form-control"
                            placeholder="MF-2026-XXXXXX"
                            required>

                        <button
                            class="primary-btn"
                            type="submit">

                            Verify

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</section>

<script>

document
    .getElementById("certificateVerifyForm")
    .addEventListener("submit", function(e){

        e.preventDefault();

        const id = document
            .getElementById("certificateId")
            .value
            .trim();

        if(id){

            window.location.href =
                "/verify/" + encodeURIComponent(id);

        }

    });

</script>
